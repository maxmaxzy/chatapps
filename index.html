```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Room Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#25D366,#128C7E);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:100%;
    max-width:500px;
    height:90vh;
    background:#ece5dd;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.header{
    background:#075E54;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:600;
}

.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message{
    max-width:75%;
    padding:10px 15px;
    border-radius:15px;
    font-size:14px;
    animation:fadeIn 0.2s ease-in-out;
}

.sent{
    align-self:flex-end;
    background:#DCF8C6;
}

.received{
    align-self:flex-start;
    background:white;
}

.timestamp{
    font-size:10px;
    opacity:0.6;
    margin-top:4px;
    text-align:right;
}

.input-area{
    display:flex;
    padding:10px;
    background:white;
    gap:5px;
}

input{
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    outline:none;
}

#username{
    width:110px;
}

#messageInput{
    flex:1;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#25D366;
    color:white;
    cursor:pointer;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(5px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        Private Room Chat
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="username" placeholder="Your name">
        <input type="text" id="messageInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// 🔥 GANTI DENGAN CONFIG FIREBASE KAMU
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Ambil room dari URL
const urlParams = new URLSearchParams(window.location.search);
let room = urlParams.get('room');

if(!room){
    room = prompt("Masukkan nama room:");
    if(!room){
        alert("Room wajib diisi!");
        throw new Error("Room tidak ada");
    }
}

const messagesRef = database.ref("rooms/" + room);

// Simpan username agar tidak berubah
let username = localStorage.getItem("chatUsername");
const usernameInput = document.getElementById("username");

if(username){
    usernameInput.value = username;
}

usernameInput.addEventListener("change", () => {
    localStorage.setItem("chatUsername", usernameInput.value);
    username = usernameInput.value;
});

function sendMessage(){
    const textInput = document.getElementById("messageInput");
    const text = textInput.value.trim();

    if(!usernameInput.value){
        alert("Isi nama dulu!");
        return;
    }

    if(text === "") return;

    messagesRef.push({
        username: usernameInput.value,
        text: text,
        timestamp: Date.now()
    });

    textInput.value = "";
}

document.getElementById("messageInput")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

messagesRef.limitToLast(100).on("child_added", snapshot => {
    const data = snapshot.val();
    displayMessage(data);
});

function formatTime(ts){
    const date = new Date(ts);
    return date.getHours().toString().padStart(2,'0') + ":" +
           date.getMinutes().toString().padStart(2,'0');
}

function displayMessage(data){
    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message");

    if(data.username === usernameInput.value){
        msgDiv.classList.add("sent");
    } else {
        msgDiv.classList.add("received");
    }

    msgDiv.innerHTML = `
        <strong>${data.username}</strong><br>
        ${data.text}
        <div class="timestamp">${formatTime(data.timestamp)}</div>
    `;

    const messagesContainer = document.getElementById("messages");
    messagesContainer.appendChild(msgDiv);

    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}
</script>

</body>
</html>
