<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Private Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#25D366,#128C7E);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:100%;
    max-width:500px;
    height:90vh;
    background:#ece5dd;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.header{
    background:#075E54;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:600;
}

.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message{
    max-width:70%;
    padding:10px 15px;
    border-radius:15px;
    font-size:14px;
}

.sent{
    align-self:flex-end;
    background:#DCF8C6;
}

.received{
    align-self:flex-start;
    background:white;
}

.input-area{
    display:flex;
    padding:10px;
    background:white;
}

input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    outline:none;
}

button{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#25D366;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        Private Room Chat
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="username" placeholder="Your name" style="max-width:120px;">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// 🔥 GANTI DENGAN CONFIG FIREBASE KAMU
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Ambil room dari URL
const urlParams = new URLSearchParams(window.location.search);
const room = urlParams.get('room');

if(!room){
    alert("Room tidak ditemukan di URL! Tambahkan ?room=namaroom");
}

const messagesRef = database.ref("rooms/" + room);

function sendMessage(){
    const username = document.getElementById("username").value || "Anonymous";
    const text = document.getElementById("messageInput").value;

    if(text.trim() === "") return;

    messagesRef.push({
        username: username,
        text: text,
        timestamp: Date.now()
    });

    document.getElementById("messageInput").value = "";
}

messagesRef.on("child_added", snapshot => {
    const data = snapshot.val();
    displayMessage(data);
});

function displayMessage(data){
    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message");

    const currentUser = document.getElementById("username").value;

    if(data.username === currentUser){
        msgDiv.classList.add("sent");
    } else {
        msgDiv.classList.add("received");
    }

    msgDiv.innerHTML = `<strong>${data.username}</strong><br>${data.text}`;
    document.getElementById("messages").appendChild(msgDiv);

    document.getElementById("messages").scrollTop = 
        document.getElementById("messages").scrollHeight;
}
</script>

</body>
</html>
